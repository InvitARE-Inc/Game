<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuentra la Diferente | Mundo Mágico</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #00f2fe;
            --accent-2: #4facfe;
            --text-light: #f8f9fa;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e);
            color: var(--text-light);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .glass-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 900px;
            margin: 0 auto;
        }

        .main-title {
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .btn-back:hover {
            background: var(--accent);
            color: #1a1a2e;
            transform: translateX(-5px);
        }

        /* Contenedor del Juego */
        #juego-container {
            display: grid;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .opcion-imagen {
            background: white;
            border-radius: 15px;
            padding: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: 4px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
        }

        .opcion-imagen:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent);
        }

        .opcion-imagen img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Clase para la imagen espejada (la diferente) */
        .espejada {
            transform: scaleX(-1);
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
        }

        .btn-magic {
            background: #fff;
            color: #1a1a2e;
            border: none;
            border-radius: 12px;
            padding: 10px 25px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-magic:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        @media (max-width: 576px) {
            .opcion-imagen { width: 90px; height: 90px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="../index.html" class="btn-back">
            <i class="fas fa-chevron-left me-2"></i> Volver al Menú
        </a>

        <header class="text-center mb-4">
            <h1 class="main-title">¿CUÁL ES DIFERENTE?</h1>
            <span class="badge bg-primary" id="nivel-txt">Nivel 1</span>
        </header>

        <main class="glass-container">
            <div class="row g-3 justify-content-center mb-4 text-center">
                <div class="col-4">
                    <div class="stat-card">
                        <small class="d-block opacity-50">Tiempo</small>
                        <span class="h4 m-0" id="timer">60</span>
                    </div>
                </div>
                <div class="col-4">
                    <div class="stat-card">
                        <small class="d-block opacity-50">Aciertos</small>
                        <span class="h4 m-0" id="aciertos">0</span>
                    </div>
                </div>
            </div>

            <p class="text-center opacity-75">Haz clic en la imagen diferente

            <div id="juego-container"></div>

            <div class="text-center mt-4">
                <div id="msg" class="mb-3 fw-bold h5"></div>
                <button onclick="prepararNivel()" class="btn-magic">
                    <i class="fas fa-sync-alt me-2"></i> Reiniciar Juego
                </button>
            </div>
        </main>
    </div>

    <script>
        const config = {
            rutas: ["imagenes/memoria/", "../imagenes/memoria/"],
            niveles: [
                { cantidad: 4, columnas: 2 },
                { cantidad: 6, columnas: 3 },
                { cantidad: 8, columnas: 4 },
                { cantidad: 12, columnas: 4 }
            ]
        };

        let juego = {
            nivel: 0,
            aciertos: 0,
            segundos: 60,
            intervalo: null,
            bloqueo: false
        };

        function prepararNivel() {
            clearInterval(juego.intervalo);
            const conf = config.niveles[Math.min(juego.nivel, config.niveles.length - 1)];
            
            juego.bloqueo = false;
            juego.segundos = 60;
            
            const contenedor = document.getElementById('juego-container');
            contenedor.innerHTML = '';
            contenedor.style.gridTemplateColumns = `repeat(${conf.columnas}, auto)`;
            
            document.getElementById('nivel-txt').textContent = `Nivel ${juego.nivel + 1}`;
            document.getElementById('msg').textContent = "";
            document.getElementById('aciertos').textContent = juego.aciertos;

            // Seleccionar una imagen aleatoria de las 32 disponibles
            const idImagen = Math.floor(Math.random() * 32) + 1;
            const indiceDiferente = Math.floor(Math.random() * conf.cantidad);

            for (let i = 0; i < conf.cantidad; i++) {
                const div = document.createElement('div');
                div.className = 'opcion-imagen animate__animated animate__zoomIn';
                
                const img = document.createElement('img');
                let intento = 0;
                img.onerror = function() {
                    intento++;
                    if (intento < config.rutas.length) {
                        this.src = config.rutas[intento] + `Imagen${idImagen}.png`;
                    }
                };
                img.src = config.rutas[0] + `Imagen${idImagen}.png`;

                if (i === indiceDiferente) {
                    img.classList.add('espejada');
                    div.onclick = () => acierto(div);
                } else {
                    div.onclick = () => fallo(div);
                }

                div.appendChild(img);
                contenedor.appendChild(div);
            }

            juego.intervalo = setInterval(() => {
                juego.segundos--;
                document.getElementById('timer').textContent = juego.segundos;
                if(juego.segundos <= 0) {
                    clearInterval(juego.intervalo);
                    document.getElementById('msg').innerHTML = "<span class='text-danger'>¡TIEMPO AGOTADO!</span>";
                    juego.bloqueo = true;
                }
            }, 1000);
        }

        function acierto(elemento) {
            if (juego.bloqueo) return;
            juego.bloqueo = true;
            clearInterval(juego.intervalo);
            
            elemento.style.borderColor = "#2ecc71";
            elemento.classList.add('animate__pulse');
            
            juego.aciertos++;
            juego.nivel++;
            
            document.getElementById('msg').innerHTML = "<span class='text-success'>¡CORRECTO!</span>";
            
            setTimeout(prepararNivel, 1200);
        }

        function fallo(elemento) {
            if (juego.bloqueo) return;
            elemento.style.borderColor = "#ff4757";
            elemento.classList.add('animate__shakeX');
            setTimeout(() => {
                elemento.classList.remove('animate__shakeX');
                elemento.style.borderColor = "transparent";
            }, 500);
        }

        window.onload = prepararNivel;
    </script>
</body>

</html>
